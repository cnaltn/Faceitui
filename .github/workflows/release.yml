name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        env:
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/faceitui${{ matrix.ext }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "$BIN" faceitui.exe
          else
            cp "$BIN" faceitui
          fi

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: 7z a "faceitui-${{ matrix.target }}.zip" faceitui.exe

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          chmod +x faceitui
          tar czf "faceitui-${{ matrix.target }}.tar.gz" faceitui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faceitui-${{ matrix.target }}
          path: faceitui-${{ matrix.target }}.${{ matrix.archive == 'zip' && 'zip' || 'tar.gz' }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
